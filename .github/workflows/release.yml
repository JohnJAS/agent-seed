name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Test release script
        run: node --test tools/release.test.mjs

      - name: Build release
        run: node tools/release.mjs

      - name: Create GitHub Release
        shell: pwsh
        run: |
          gh release create "${env:GITHUB_REF_NAME}" `
            outputs/*.zip `
            outputs/bundled-skills/**/*.zip `
            --title "${env:GITHUB_REF_NAME}" `
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
