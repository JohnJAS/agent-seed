name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Test release script
        run: node --test tools/release.test.mjs

      - name: Build release
        run: node tools/release.mjs

      - name: Show release files
        shell: pwsh
        run: |
          $files = @(
            Get-ChildItem -Path outputs -Filter *.zip -Recurse -File
            Get-ChildItem -Path outputs -Filter *-release.json -File
          )

          $files | ForEach-Object {
            Write-Host $_.FullName
          }

      - name: Create GitHub Release
        shell: pwsh
        run: |
          $files = @(
            Get-ChildItem -Path outputs -Filter *.zip -Recurse -File
            Get-ChildItem -Path outputs -Filter *-release.json -File
          ) | ForEach-Object {
            $_.FullName
          }

          if ($files.Count -eq 0) {
            Write-Error "No release files found under outputs/"
            exit 1
          }

          gh release create "${env:GITHUB_REF_NAME}" $files `
            --title "${env:GITHUB_REF_NAME}" `
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
